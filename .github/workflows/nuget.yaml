name: Publish NuGet Package

on:
  push:
    tags:
      - 'v[0-9].*'
  workflow_dispatch:

permissions:
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Restore Dependencies
      run: dotnet restore

    - name: Build Project
      run: dotnet build --configuration Release --no-restore

    - name: Run Tests
      run: dotnet test --configuration Release --no-build

    - name: Pack NuGet Package
      run: dotnet pack --configuration Release --no-build --output dist WslcWrapper/WslcWrapper.csproj
      
    - name: NuGet Trusted Publishing Login
      uses: NuGet/login@v1
      id: nuget_login
      with:
        user: ${{ secrets.NUGET_USER }}

    - name: Push to NuGet.org via OIDC
      run: |
        dotnet nuget push "dist/*.nupkg" \
          --source https://api.nuget.org/v3/index.json \
          --api-key ${{ steps.nuget_login.outputs.NUGET_API_KEY }} \
          --skip-duplicate